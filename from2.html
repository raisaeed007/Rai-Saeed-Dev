
<h1 style="background-color: crimson;">University Registration Form </h1>
<p>Please Fill out the form</p>
<hr>
<form style="background-color: plum;">
    <h1>Personal Information</h1>
    <label for="Name">First Name:</label>
    <input type="text" name="text" id="Name" placeholder="e.g.,Rai">
    <br><br>
    <label for="Name">Second Name:</label>
    <input type="text" name="text" id="Name" placeholder="e.g.,Saeed">
    <br><br>
    <label for="DOB">Date Of Birth:</label>
    <input type="date" name="date" id="DOB">
    <p>Gender:</p>
    <input type="radio" name="Gender" id="Gender">
    <label for="Gender">Male</label>
    <br><br>
    <input type="radio" name="Gender" id="Gender">
    <label for="Gender">Female</label>
    <br><br>
    <input type="radio" name="Gender" id="Gender">
    <label for="Gender">Other</label>
    <p>Upload your photo:</p>
    <input type="file">
    <br><br>
    <hr>

    <h1>Contact Information</h1>
    <label for="Email">Email Address:</label>
    <input type="text" name="text" id="Email" placeholder="My@example.com">
    <br><br>
    <label for="Phone">Phone No:</label>
    <input type="tel" name="text" id="Phone" placeholder="e.g,8958760">
    <p>Mailing Addresses:</p>
    <textarea name="text" id="text" placeholder="e.g.,as@gmail.com" rows="10" cols="20"></textarea>
    <br><br>

    <h1>Academic Information</h1>
    <label for="course">Select your course:</label>
    <select name="course" id="course">
        <option value="CSS">CSS</option>
        <option value="JAVA">JAVA</option>
        <option value="PYTHN">PYTHN</option>
        <option value="SQL">SQL</option>
    </select>
    
    <p>Interest Circle:</p>
    <input type="radio" id="Spots">
    <label for="Spots">Spots</label>
    <br>
    <input type="radio" id="Music">
    <label for="Music">Music</label>
    <br>
    <input type="radio" id="Cricket">
    <label for="Cricket">Cricket</label>
    <br>
    <input type="radio" id="Technology Club">
    <label for="Technology Club">Technology Club</label>

    <br>
    <hr>
    <h1>Create Your Account</h1>
    <label for="Password">Create a password:</label>
    <input type="password" name="password" id="password">
    <br><br>
    <label for="Question">Security Question:</label>
    <select name="Select" id="Select">
        <option value="What is your father name?">What is your father name?</option>
        <option value="What is your cast?">What is your father name?</option>
        <option value="What is your favourate color?">What is your father name?</option>
        <option value="What is your age?">What is your father name?</option>
    </select>
    <br><br>
    <label for="Answer">Security Answer:</label>
    <input type="text" name=text" id="Answer">
    <br><br>
    <input type="radio">
    <label for="">I agree with terms and conditions</label>
    <br>
    <hr>
    <br>
    <button type="Submit">Register</button>
    <button type="reset">Clear Form</button>
</form>
